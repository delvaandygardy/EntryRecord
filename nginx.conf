server {
    listen 8888;  # Ports 80 et 8080 réservés par Apache QNAP
    server_name _;

    client_max_body_size 50M;

    # WebSocket (alertes + flux caméra)
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Flux HLS caméras (MediaMTX)
    location /hls/ {
        proxy_pass         http://mediamtx:8888/;
        proxy_set_header   Host              $host;
        add_header         Cache-Control     no-cache;
        add_header         Access-Control-Allow-Origin *;
    }

    # API caméras — timeout long pour streaming; sans slash final pour éviter redirect 301
    location /api/cameras {
        proxy_pass         http://backend:8000;
        proxy_read_timeout 300s;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # API + React SPA
    location / {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
