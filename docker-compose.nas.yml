# ─────────────────────────────────────────────────────────────────────────
#  Déploiement NAS QNAP
#  Note: entrypoint=/bin/sh requis car le runc QNAP valide l'entrypoint
#  sur le HOST avant d'entrer dans le container (bug/comportement QNAP).
# ─────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: enreg_db
    # Contournement QNAP: /bin/sh existe sur host → bypass validation runc
    # pg_entrypoint.sh + fake_uid.so: LD_PRELOAD pour lancer postgres sans root rejet
    # PGDATA doit être chown 70:70 chmod 700 sur le host avant démarrage
    entrypoint: ["/bin/sh", "-c"]
    command: ["bash /pg_entrypoint.sh"]
    environment:
      POSTGRES_DB:       ${DB_NAME:-enregistrement_auto}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      FAKE_UID_SO:       /fake_uid.so
      LD_PRELOAD:        /fake_uid.so
    volumes:
      - /share/Container/enreg/pgdata:/var/lib/postgresql/data
      - /share/Container/enreg/pg_entrypoint.sh:/pg_entrypoint.sh:ro
      - /share/Container/enreg/fake_uid.so:/fake_uid.so:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - enreg_net

  backend:
    build:
      context: .
      network: host
    container_name: enreg_backend
    # /bin/sh existe sur le host QNAP → bypass la validation runc
    entrypoint: ["/bin/sh", "-c"]
    # python3 -m uvicorn évite exec sur script uvicorn avec shebang (même bug QNAP overlayfs)
    command: ["python3 -m uvicorn backend.main:app --host 0.0.0.0 --port 8000"]
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - /share/Container/enreg/assets:/app/assets
    restart: unless-stopped
    networks:
      - enreg_net

  nginx:
    image: nginx:1.25-alpine
    container_name: enreg_nginx
    # /bin/sh existe sur le host QNAP → bypass la validation runc
    entrypoint: ["/bin/sh", "-c"]
    command: ["nginx -g 'daemon off;'"]
    ports:
      - "8888:8888"   # Ports 80/8080 réservés par Apache QNAP
    volumes:
      - /share/Container/enreg/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - enreg_net

networks:
  enreg_net:
    external: true
    # Créé manuellement: docker network create --driver bridge --subnet 172.28.0.0/16 enreg_net
    # qnetwork-tool QNAP échoue à créer des réseaux à la volée depuis compose
