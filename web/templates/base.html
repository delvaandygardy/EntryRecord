<!doctype html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Enregistrement Auto{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <style>
    :root { --sidebar-w: 230px; }
    body { background: #0f1117; color: #e0e0e0; }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-w); min-height: 100vh;
      background: #161b22; border-right: 1px solid #30363d;
      position: fixed; top: 0; left: 0; z-index: 100;
      display: flex; flex-direction: column;
    }
    #sidebar .brand {
      padding: 22px 20px 10px;
      font-size: .75rem; font-weight: 700; letter-spacing: .08em;
      color: #58a6ff; text-transform: uppercase;
    }
    #sidebar .brand span { display: block; font-size: .7rem; font-weight: 400; color: #8b949e; }
    #sidebar .nav-link {
      color: #c9d1d9; padding: 9px 20px; border-radius: 6px; margin: 2px 8px;
      font-size: .875rem; display: flex; align-items: center; gap: 10px;
    }
    #sidebar .nav-link:hover, #sidebar .nav-link.active {
      background: #21262d; color: #58a6ff;
    }
    #sidebar .nav-link i { font-size: 1rem; width: 18px; }
    #sidebar .clock {
      margin-top: auto; padding: 16px 20px;
      font-size: .8rem; color: #8b949e; text-align: center;
      border-top: 1px solid #30363d;
    }

    /* Main */
    #main { margin-left: var(--sidebar-w); padding: 28px 32px; min-height: 100vh; }

    /* Stat cards */
    .stat-card { border-radius: 12px; padding: 20px 24px; position: relative; overflow: hidden; }
    .stat-card .num { font-size: 2.4rem; font-weight: 700; line-height: 1; }
    .stat-card .lbl { font-size: .8rem; opacity: .85; margin-top: 4px; }
    .stat-card .icon-bg {
      position: absolute; right: 16px; bottom: 10px;
      font-size: 3rem; opacity: .15;
    }

    /* Tables */
    .table { --bs-table-bg: transparent; --bs-table-striped-bg: #161b22; }
    .table thead th { border-bottom: 1px solid #30363d; font-size: .8rem;
                      text-transform: uppercase; letter-spacing: .05em; color: #8b949e; }
    .table td { vertical-align: middle; font-size: .875rem; }
    .badge-actif   { background: #1a7f4b22; color: #3fb950; border: 1px solid #1a7f4b55; }
    .badge-inactif { background: #6e768133; color: #8b949e; border: 1px solid #30363d; }

    /* Forms */
    .form-control, .form-select {
      background: #161b22; border-color: #30363d; color: #c9d1d9;
    }
    .form-control:focus, .form-select:focus {
      background: #1c2128; border-color: #58a6ff; box-shadow: 0 0 0 3px #388bfd26; color: #c9d1d9;
    }

    /* Topbar */
    .topbar { margin-bottom: 24px; border-bottom: 1px solid #21262d; padding-bottom: 16px; }
    .topbar h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="brand">Accès Système <span>Enregistrement Auto</span></div>
  <ul class="nav flex-column mt-2">
    <li><a class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}" href="/">
      <i class="bi bi-grid-1x2-fill"></i> Tableau de Bord</a></li>
    <li><a class="nav-link {% if request.endpoint=='vehicules' %}active{% endif %}" href="/vehicules">
      <i class="bi bi-car-front-fill"></i> Véhicules</a></li>
    <li><a class="nav-link {% if request.endpoint=='conducteurs' %}active{% endif %}" href="/conducteurs">
      <i class="bi bi-person-badge-fill"></i> Conducteurs</a></li>
    <li><a class="nav-link {% if request.endpoint=='pietons' %}active{% endif %}" href="/pietons">
      <i class="bi bi-people-fill"></i> Piétons</a></li>
    <li><a class="nav-link {% if request.endpoint=='employes' %}active{% endif %}" href="/employes">
      <i class="bi bi-briefcase-fill"></i> Employés</a></li>
    <li class="mt-2"><a class="nav-link {% if request.endpoint=='recherche' %}active{% endif %}" href="/recherche">
      <i class="bi bi-search"></i> Recherche</a></li>
  </ul>
  <div class="clock" id="clock">--:--:--</div>
</nav>

<!-- Main -->
<main id="main">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script>
  // Clock
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('fr') + '\n' + now.toLocaleDateString('fr');
  }
  tick(); setInterval(tick, 1000);

  // DataTables init for any .dt-table
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.dt-table').forEach(el => {
      $(el).DataTable({
        language: { url: 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/fr-FR.json' },
        order: [[0,'desc']], pageLength: 25,
      });
    });
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
