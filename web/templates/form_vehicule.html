{% extends "base.html" %}
{% block title %}Ajouter Véhicule{% endblock %}
{% block content %}
<div class="topbar"><h1><i class="bi bi-car-front me-2"></i>Ajouter un Véhicule</h1></div>
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card bg-dark border-secondary">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Plaque <span class="text-danger">*</span></label>
            <input name="plaque" class="form-control form-control-lg text-uppercase"
                   placeholder="Ex: HT-1234-A" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Point d'entrée</label>
            <select name="point_entree" class="form-select">
              {% for p in points %}<option>{{ p }}</option>{% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Notes</label>
            <input name="notes" class="form-control" placeholder="Optionnel">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-check-lg"></i> Enregistrer
            </button>
            <a href="/vehicules" class="btn btn-outline-secondary px-4">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
